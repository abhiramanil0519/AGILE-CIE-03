name: Run Streamlit App

on:
  push:
    branches:
      - main

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/agile-ml-dl-qml .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/agile-ml-dl-qml

      - name: Run Container
        run: |
          docker run -d -p 8501:8501 --name test-container ${{ secrets.DOCKER_USERNAME }}/agile-ml-dl-qml
          sleep 20

      - name: Verify App
        run: curl http://localhost:8501

      - name: Stop Container
        run: docker stop test-container